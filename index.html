<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Education Management System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>📚 Education Management System </h1>

<div class="container">

  <div class="card" onclick="showSchools()">
    <h2>🏫 Schools</h2>
    <p>View School List</p>
  </div>

  <div class="card" onclick="searchDISE()">
    <h2>🔍 DISE Search</h2>
    <p>Search by DISE Code</p>
  </div>

  <div class="card" onclick="showTeachers()">
    <h2>👨‍🏫 Teachers</h2>
    <p>View Teachers</p>
  </div>
<div class="card" onclick="openGoogleForm()">
    <h2>📝 Google Form</h2>
    <p>Open Data Collection Form</p>
</div>
  <div class="card" onclick="searchKGID()">
    <h2>🆔 KGID Search</h2>
    <p>Search by KGID</p>
  </div>

</div>

<div id="output"></div>

<script src="schools.js"></script>
<script src="script.js"></script>
</body>
</html>
